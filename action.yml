name: "Issue AI Agent for Forgejo"
description: "AI-powered Forgejo issue triage: classify, label, detect duplicates, and reply"
author: "andrewthetechie"

branding:
  icon: "zap"
  color: "purple"

inputs:
  forgejo-server-url:
    description: "URL of the Forgejo instance (defaults to the GitHub Actions server URL)"
    required: false
    default: "${{ github.server_url }}"
  forgejo-token:
    description: "Forgejo token for API access"
    required: false
    default: "${{ github.token }}"
  forgejo-server-url:
    description: "URL of the Forgejo instance (defaults to ${{ github.server_url }})"
    required: false
    default: "${{ github.server_url }}"
  anthropic-api-key:
    description: "Anthropic API key for Claude"
    required: false
  openai-api-key:
    description: "OpenAI API key"
    required: false
  llm-provider:
    description: "LLM provider to use (anthropic or openai)"
    required: false
    default: "anthropic"
  llm-base-url:
    description: "Custom base URL for LLM API (applies to the selected provider)"
    required: false
  config-path:
    description: "Path to the config YAML file in the repo"
    required: false
    default: ".forgejo/issue-ai.yml"

outputs:
  category:
    description: "Classified issue category"
  priority:
    description: "Classified issue priority"
  labels-applied:
    description: "Comma-separated list of applied labels"
  reply-posted:
    description: "Whether a reply comment was posted"

runs:
  using: "node20"
  main: "dist/index.js"
